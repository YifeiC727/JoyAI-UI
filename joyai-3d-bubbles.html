<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoyAI - 3D Bubbles</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  overflow: hidden;
  background: #060a14;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #fff;
}
#canvas-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}
canvas { display: block; }

.nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 32px;
}
.nav-left {
  display: flex; align-items: center; gap: 28px;
}
.logo {
  font-size: 18px; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.logo-icon {
  width: 28px; height: 28px;
  background: radial-gradient(circle at 40% 40%, #6ec6ff, #2a6dd4);
  border-radius: 50%;
}
.nav-link {
  font-size: 14px; color: rgba(255,255,255,0.7);
  cursor: pointer; transition: color 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.nav-link:hover { color: #fff; }
.nav-right {
  display: flex; align-items: center; gap: 12px;
}
.btn-outline {
  padding: 8px 20px; border: 1px solid rgba(255,255,255,0.25);
  border-radius: 20px; font-size: 13px; color: #fff;
  cursor: pointer; background: rgba(255,255,255,0.06);
  transition: background 0.2s;
}
.btn-outline:hover { background: rgba(255,255,255,0.12); }
.credits {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 16px;
  background: rgba(255,255,255,0.08); font-size: 13px;
}
.credits-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #4ecdc4;
}
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.bottom-ui {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  z-index: 10;
  display: flex; flex-direction: column; align-items: center; gap: 16px;
}
.create-row {
  display: flex; align-items: center; gap: 10px;
}
.btn-create {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 32px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 28px;
  background: rgba(255,255,255,0.05);
  color: #fff; font-size: 15px;
  cursor: pointer; transition: all 0.3s;
  backdrop-filter: blur(8px);
}
.btn-create:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.4);
}
.btn-icon {
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: rgba(255,255,255,0.6);
  transition: all 0.3s;
}
.btn-icon:hover { background: rgba(255,255,255,0.12); }
.view-more {
  font-size: 13px; color: rgba(255,255,255,0.5);
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; gap: 2px;
}
.chevrons { font-size: 10px; letter-spacing: 2px; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <div class="logo"><div class="logo-icon"></div>JoyAI</div>
    <div class="nav-link">🌐 世界探索</div>
    <div class="nav-link">🎬 实时导演</div>
  </div>
  <div class="nav-right">
    <div class="btn-outline">企业合作</div>
    <div class="credits"><div class="credits-dot"></div>1000</div>
    <div class="avatar"></div>
  </div>
</nav>

<div id="canvas-container"></div>

<div class="bottom-ui">
  <div class="create-row">
    <div class="btn-create">＋ 创建世界</div>
    <div class="btn-icon">📎</div>
  </div>
  <div class="view-more">
    查看更多
    <span class="chevrons">⌄⌄</span>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

// --- Background gradient ---
const bgCanvas = document.createElement('canvas');
bgCanvas.width = 2; bgCanvas.height = 512;
const bgCtx = bgCanvas.getContext('2d');
const grad = bgCtx.createLinearGradient(0, 0, 0, 512);
grad.addColorStop(0, '#0d1526');
grad.addColorStop(0.5, '#080d1a');
grad.addColorStop(1, '#040710');
bgCtx.fillStyle = grad;
bgCtx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(bgCanvas);
scene.background = bgTexture;

// --- Stars ---
const starCount = 800;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
const starSizes = new Float32Array(starCount);
for (let i = 0; i < starCount; i++) {
  starPos[i * 3] = (Math.random() - 0.5) * 60;
  starPos[i * 3 + 1] = (Math.random() - 0.5) * 40;
  starPos[i * 3 + 2] = (Math.random() - 0.5) * 40 - 10;
  starSizes[i] = Math.random() * 1.5 + 0.5;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
const starMat = new THREE.PointsMaterial({
  color: 0xffffff, size: 0.04, sizeAttenuation: true,
  transparent: true, opacity: 0.6
});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// --- Lighting ---
const ambientLight = new THREE.AmbientLight(0x334466, 0.5);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 5, 5);
scene.add(dirLight);
const pointLight = new THREE.PointLight(0x6688cc, 0.8, 20);
pointLight.position.set(-3, 2, 4);
scene.add(pointLight);
const rimLight = new THREE.PointLight(0x9966ff, 0.4, 15);
rimLight.position.set(3, -2, 3);
scene.add(rimLight);

// --- Environment map for reflections ---
const pmremGenerator = new THREE.PMREMGenerator(renderer);
const envScene = new THREE.Scene();
const envGeo = new THREE.SphereGeometry(5, 32, 32);
const envCanvas = document.createElement('canvas');
envCanvas.width = 512; envCanvas.height = 256;
const envCtx = envCanvas.getContext('2d');
const envGrad = envCtx.createLinearGradient(0, 0, 512, 256);
envGrad.addColorStop(0, '#1a1a3e');
envGrad.addColorStop(0.3, '#0d1526');
envGrad.addColorStop(0.5, '#162040');
envGrad.addColorStop(0.7, '#0a1020');
envGrad.addColorStop(1, '#1a1a3e');
envCtx.fillStyle = envGrad;
envCtx.fillRect(0, 0, 512, 256);
for (let i = 0; i < 50; i++) {
  envCtx.fillStyle = `rgba(255,255,255,${Math.random() * 0.3 + 0.1})`;
  envCtx.beginPath();
  envCtx.arc(Math.random() * 512, Math.random() * 256, Math.random() * 2 + 0.5, 0, Math.PI * 2);
  envCtx.fill();
}
const envTexture = new THREE.CanvasTexture(envCanvas);
envTexture.mapping = THREE.EquirectangularReflectionMapping;
const envMap = pmremGenerator.fromEquirectangular(envTexture).texture;

// --- Bubble data ---
const bubbleConfigs = [
  { x: -3.2, y: 0.8, z: -1, r: 1.2, speed: 0.12, phase: 0 },
  { x: 1.5, y: 2.2, z: -2, r: 0.9, speed: 0.15, phase: 1.2 },
  { x: 4.0, y: 0.5, z: 0, r: 1.8, speed: 0.08, phase: 2.5 },
  { x: 1.2, y: -0.3, z: -1.5, r: 1.0, speed: 0.13, phase: 3.8 },
  { x: -1.0, y: -2.5, z: 0.5, r: 1.6, speed: 0.10, phase: 5.0 },
  { x: 3.5, y: -2.8, z: 1, r: 0.7, speed: 0.18, phase: 0.8 },
  { x: -4.5, y: -1.0, z: -0.5, r: 0.65, speed: 0.16, phase: 4.2 },
];

const textureLoader = new THREE.TextureLoader();
const bubbles = [];

bubbleConfigs.forEach((cfg, i) => {
  const group = new THREE.Group();
  group.position.set(cfg.x, cfg.y, cfg.z);

  // Inner sphere with image
  const innerGeo = new THREE.SphereGeometry(cfg.r * 0.92, 64, 64);
  const innerMat = new THREE.MeshBasicMaterial({ color: 0x333344 });
  const innerMesh = new THREE.Mesh(innerGeo, innerMat);

  textureLoader.load(
    `https://picsum.photos/512/512?random=${i + 10}`,
    (tex) => {
      tex.colorSpace = THREE.SRGBColorSpace;
      innerMat.map = tex;
      innerMat.needsUpdate = true;
    },
    undefined,
    () => {
      innerMat.color.set(new THREE.Color().setHSL(i * 0.12, 0.4, 0.25));
    }
  );

  // Outer glass shell
  const outerGeo = new THREE.SphereGeometry(cfg.r, 64, 64);
  const outerMat = new THREE.MeshPhysicalMaterial({
    color: 0xffffff,
    metalness: 0.0,
    roughness: 0.03,
    transmission: 0.92,
    thickness: cfg.r * 0.6,
    ior: 1.45,
    clearcoat: 1.0,
    clearcoatRoughness: 0.02,
    envMap: envMap,
    envMapIntensity: 1.5,
    transparent: true,
    opacity: 0.95,
    side: THREE.FrontSide,
  });
  const outerMesh = new THREE.Mesh(outerGeo, outerMat);

  // Edge glow ring
  const ringGeo = new THREE.RingGeometry(cfg.r * 0.98, cfg.r * 1.02, 64);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0x88aaff, transparent: true, opacity: 0.08,
    side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.lookAt(camera.position);

  group.add(innerMesh);
  group.add(outerMesh);
  group.add(ring);

  scene.add(group);
  bubbles.push({
    group, innerMesh, outerMesh, ring, cfg,
    baseY: cfg.y, baseX: cfg.x,
    rotSpeed: (Math.random() - 0.5) * 0.003,
  });
});

// --- Mouse parallax ---
let mouseX = 0, mouseY = 0;
let targetMouseX = 0, targetMouseY = 0;
window.addEventListener('mousemove', (e) => {
  targetMouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  targetMouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation ---
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Smooth mouse
  mouseX += (targetMouseX - mouseX) * 0.03;
  mouseY += (targetMouseY - mouseY) * 0.03;

  // Camera parallax
  camera.position.x = mouseX * 0.4;
  camera.position.y = -mouseY * 0.3;
  camera.lookAt(0, 0, -2);

  // Stars subtle rotation
  stars.rotation.y = t * 0.01;
  stars.rotation.x = t * 0.005;

  // Animate bubbles
  bubbles.forEach((b) => {
    const { group, ring, cfg, baseY, baseX, rotSpeed } = b;

    // Floating motion
    group.position.y = baseY + Math.sin(t * 0.5 + cfg.phase) * 0.25;
    group.position.x = baseX + Math.sin(t * 0.3 + cfg.phase * 0.7) * 0.12;

    // Slow Z drift toward camera
    group.position.z += cfg.speed * 0.008;
    if (group.position.z > 6) {
      group.position.z = -6 - Math.random() * 4;
    }

    // Inner sphere slow rotation
    b.innerMesh.rotation.y += rotSpeed;
    b.innerMesh.rotation.x += rotSpeed * 0.3;

    // Ring always faces camera
    ring.lookAt(camera.position);

    // Scale based on z for depth feeling
    const depth = (group.position.z + 10) / 16;
    const s = 0.6 + depth * 0.5;
    group.scale.setScalar(s);
  });

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
