<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoyAI - 首页分发</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
  background: #fafafa;
  color: #1a1a2e;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Nav */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 40px;
}
.nav-logo {
  font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, #7c3aed, #2563eb);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.nav-right { display: flex; align-items: center; gap: 12px; }
.nav-btn {
  padding: 8px 20px; border-radius: 20px; font-size: 13px;
  cursor: pointer; border: none; font-family: inherit;
}
.nav-btn.outline { background: transparent; border: 1px solid rgba(0,0,0,0.15); color: #1a1a2e; }
.nav-btn.solid { background: #7c3aed; color: #fff; font-weight: 600; }
.nav-tabs-slot {
  display: none;
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  gap: 4px; align-items: center;
}
.nav-tabs-slot .cat-tab { padding: 7px 18px; font-size: 13px; }
body.version-b .nav-tabs-slot { display: flex; }
body.version-b .category-tabs { display: none; }
body.version-b .nav { background: rgba(250,250,250,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.06); }

/* Hero */
.hero { text-align: center; padding: 140px 40px 40px; }
.hero-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 16px; border-radius: 20px;
  background: rgba(124,58,237,0.06); border: 1px solid rgba(124,58,237,0.12);
  font-size: 12px; color: #7c3aed; margin-bottom: 28px;
}
.hero h1 { font-size: 52px; font-weight: 700; line-height: 1.2; margin-bottom: 20px; letter-spacing: -1px; }
.hero h1 .accent {
  background: linear-gradient(135deg, #7c3aed, #60a5fa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero p { font-size: 16px; color: rgba(0,0,0,0.45); max-width: 560px; margin: 0 auto 48px; line-height: 1.6; }

/* Category tabs */
.category-tabs { display: flex; justify-content: center; gap: 6px; margin-bottom: 60px; }
.cat-tab {
  padding: 10px 24px; border-radius: 24px;
  background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.08);
  font-size: 14px; color: rgba(0,0,0,0.5);
  cursor: pointer; transition: all 0.25s; font-family: inherit; user-select: none;
}
.cat-tab:hover { background: rgba(0,0,0,0.06); color: #1a1a2e; }
.cat-tab.active { background: #7c3aed; color: #fff; font-weight: 600; border-color: #7c3aed; }

/* Cards container */
.cards-container {
  position: relative;
  display: flex; justify-content: center; align-items: flex-end;
  min-height: 420px;
  padding: 0 40px 60px;
}

.card {
  position: absolute;
  width: 260px; height: 360px;
  background: #fff; border-radius: 24px;
  border: 1px solid rgba(0,0,0,0.06);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.08);
  transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.4s ease, opacity 0.3s ease, border-color 0.2s;
  transform-origin: bottom center;
  cursor: pointer;
}
/* Hover light feedback (instant, before full shift) */
.card.hover-light {
  border-color: rgba(124,58,237,0.2);
  box-shadow: 0 16px 48px rgba(0,0,0,0.10);
}
.card-label { font-size: 20px; font-weight: 700; color: #1a1a2e; }
.card-sub { font-size: 13px; color: #9b9bb0; }
.card-tag {
  position: absolute; top: 16px; right: 16px;
  padding: 4px 10px; border-radius: 8px;
  background: #f0eef5; font-size: 10px; font-weight: 600;
  color: #7c3aed; letter-spacing: 0.5px;
}

/* Version switch */
.version-switch {
  position: fixed; bottom: 24px; right: 24px; z-index: 200;
  display: flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: 24px;
  background: #1a1a2e; color: #fff;
  font-size: 13px; font-weight: 500;
  cursor: pointer; border: none; font-family: inherit;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  transition: all 0.2s;
}
.version-switch:hover { background: #2d2b55; transform: translateY(-2px); }
.version-switch .vs-dot { width: 8px; height: 8px; border-radius: 50%; background: #7c3aed; }

/* Subtle background dots */
.bg-dots {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: radial-gradient(circle, rgba(124,58,237,0.03) 1px, transparent 1px);
  background-size: 32px 32px;
}
</style>
</head>
<body>

<div class="bg-dots"></div>

<nav class="nav">
  <div class="nav-logo">JoyAI</div>
  <div class="nav-tabs-slot" id="nav-tabs-slot"></div>
  <div class="nav-right">
    <button class="nav-btn outline">登录</button>
    <button class="nav-btn solid">开始使用</button>
  </div>
</nav>

<section class="hero">
  <div class="hero-badge">✦ JoyAI — 全栈 AI 能力平台</div>
  <h1>灵感<span class="accent">即刻实现</span><br>体验 · 交互 · 创作</h1>
  <p>用 JoyAI 探索未来的无限可能</p>
  <div class="category-tabs" id="hero-tabs"></div>
</section>

<div class="cards-container" id="cards-container"></div>

<button class="version-switch" onclick="toggleVersion()">
  <div class="vs-dot"></div>
  <span id="vs-label">切换布局 B</span>
</button>

<script>
const categories = {
  newest: [
    { label: '流式理解', sub: 'JoyAI-VL', tag: 'NEW' },
    { label: '流式编辑', sub: 'Image/Video Edit', tag: 'NEW' },
    { label: '长视频生成', sub: 'Echo Studio', tag: 'NEW' },
    { label: '世界模型', sub: 'World Model', tag: 'NEW' },
    { label: '具身仿真', sub: 'JoyAI-Sim', tag: 'NEW' },
  ],
  dialog: [
    { label: '文字助手', sub: 'JoyAI-Flash' },
    { label: '流式理解', sub: 'JoyAI-VL', tag: 'NEW' },
  ],
  visual: [
    { label: '图像创作', sub: '即时生成' },
    { label: '视频创作', sub: '即时生成' },
    { label: '流式编辑', sub: 'Image/Video Edit', tag: 'NEW' },
    { label: '长视频生成', sub: 'Echo Studio', tag: 'NEW' },
    { label: '世界模型', sub: 'World Model', tag: 'NEW' },
  ],
  voice: [
    { label: '语音聊天', sub: 'JoyAI-Talker' },
    { label: '音色创作', sub: 'JoyAI-Voice' },
    { label: '多角色配音', sub: 'JoyAI-Voice' },
  ],
  sim: [
    { label: '具身仿真', sub: 'JoyAI-Sim', tag: 'NEW' },
  ],
  studio: [
    { label: '流式编辑', sub: 'Edit Studio' },
    { label: '长视频生成', sub: 'Echo Studio' },
    { label: '世界模型', sub: 'World Model' },
    { label: '具身仿真', sub: 'JoyAI-Sim' },
  ],
};

let currentCat = 'newest';
const SPACING = 200;

// Card → v2 page mapping
const cardRoutes = {
  '文字助手':   { domain: 'text', tab: null },
  '流式理解':   { domain: 'vision', tab: 'vision-live' },
  '图像创作':   { domain: 'image', tab: 'image-gen' },
  '视频创作':   { domain: 'video', tab: 'video-gen' },
  '流式编辑':   { domain: 'image', tab: 'image-edit' },
  '长视频生成': { domain: 'echo', tab: null },
  '世界模型':   { domain: 'world', tab: null },
  '语音聊天':   { domain: 'voice', tab: 'voice-talker' },
  '音色创作':   { domain: 'voice', tab: 'voice-clone' },
  '多角色配音': { domain: 'voice', tab: 'voice-dub' },
  '具身仿真':   { domain: 'sim', tab: null },
};

function buildTabs() {
  const tabs = [
    { key: 'newest', label: '最近上新' },
    { key: 'dialog', label: '对话助手' },
    { key: 'visual', label: '视觉创作' },
    { key: 'voice', label: '语音交互' },
    { key: 'sim', label: '具身仿真' },
    { key: 'studio', label: '创意工坊' },
  ];
  return tabs.map(t =>
    `<div class="cat-tab ${t.key === currentCat ? 'active' : ''}" data-cat="${t.key}" onclick="switchCat('${t.key}')">${t.label}</div>`
  ).join('');
}

function switchCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t =>
    t.classList.toggle('active', t.getAttribute('data-cat') === cat)
  );
  renderCards(cat);
}

function getCardTransform(offset, count) {
  const rotate = offset * 6;
  const baseY = Math.abs(offset) * 18;
  const scale = 1 - Math.abs(offset) * 0.03;
  const x = offset * SPACING;
  return { x, y: baseY, rotate, scale, z: count - Math.abs(Math.round(offset)) };
}

function renderCards(cat) {
  const container = document.getElementById('cards-container');
  const items = categories[cat];
  const count = items.length;
  container.innerHTML = '';

  let activeIndex = -1;
  let hoverTimer = null;
  const cardEls = [];

  items.forEach((item, i) => {
    const centerIndex = (count - 1) / 2;
    const offset = i - centerIndex;
    const t = getCardTransform(offset, count);

    const card = document.createElement('div');
    card.className = 'card';
    card.style.zIndex = t.z;
    // Start hidden
    card.style.opacity = '0';
    card.style.transform = `translateX(${t.x}px) translateY(80px) rotate(${t.rotate}deg) scale(0.8)`;

    let html = `<div class="card-label">${item.label}</div><div class="card-sub">${item.sub}</div>`;
    if (item.tag) html += `<div class="card-tag">${item.tag}</div>`;
    card.innerHTML = html;

    container.appendChild(card);
    cardEls.push(card);

    // Animate in
    requestAnimationFrame(() => {
      setTimeout(() => {
        card.style.opacity = '1';
        card.style.transform = `translateX(${t.x}px) translateY(${t.y}px) rotate(${t.rotate}deg) scale(${t.scale})`;
      }, i * 80);
    });
  });

  // Container-level mouse tracking
  // Logic: hover timer resets on EVERY mouse move.
  // Only when mouse STOPS for 180ms do we shift.
  // This prevents: card shifts → new card under cursor → instant re-shift
  let lockedIndex = -1;
  let lightIndex = -1;

  container.onmousemove = (e) => {
    if (lockedIndex >= 0) return;

    const rect = container.getBoundingClientRect();
    const mouseX = e.clientX - rect.left - rect.width / 2;
    const centerIndex = (count - 1) / 2;

    // Find closest card based on current positions
    let closest = 0;
    let closestDist = Infinity;
    for (let i = 0; i < count; i++) {
      const shiftAmount = activeIndex >= 0 ? (activeIndex - centerIndex) * SPACING : 0;
      const cardX = (i - centerIndex) * SPACING - shiftAmount;
      const dist = Math.abs(mouseX - cardX);
      if (dist < closestDist) { closestDist = dist; closest = i; }
    }

    // Too far from any card
    if (closestDist > SPACING * 0.8) {
      clearTimeout(hoverTimer);
      cardEls.forEach(c => c.classList.remove('hover-light'));
      lightIndex = -1;
      return;
    }

    // Phase 1: instant light feedback on closest card
    if (closest !== lightIndex) {
      cardEls.forEach(c => c.classList.remove('hover-light'));
      cardEls[closest].classList.add('hover-light');
      lightIndex = closest;
    }

    // Phase 2: ALWAYS reset timer on every mouse move.
    // Only fires if mouse truly stops for 180ms.
    clearTimeout(hoverTimer);
    if (closest !== activeIndex) {
      hoverTimer = setTimeout(() => {
        activeIndex = closest;
        cardEls.forEach(c => c.classList.remove('hover-light'));
        lightIndex = -1;
        applyPositions(cardEls, count, activeIndex);
      }, 180);
    }
  };

  container.onmouseleave = () => {
    if (lockedIndex >= 0) return;
    clearTimeout(hoverTimer);
    cardEls.forEach(c => c.classList.remove('hover-light'));
    lightIndex = -1;
    hoverTimer = setTimeout(() => {
      activeIndex = -1;
      applyPositions(cardEls, count, -1);
    }, 300);
  };

  // Click: lock card in center
  container.onclick = (e) => {
    const rect = container.getBoundingClientRect();
    const mouseX = e.clientX - rect.left - rect.width / 2;
    const centerIndex = (count - 1) / 2;

    let closest = 0;
    let closestDist = Infinity;
    for (let i = 0; i < count; i++) {
      const shiftAmount = activeIndex >= 0 ? (activeIndex - centerIndex) * SPACING : 0;
      const cardX = (i - centerIndex) * SPACING - shiftAmount;
      const dist = Math.abs(mouseX - cardX);
      if (dist < closestDist) { closestDist = dist; closest = i; }
    }

    if (lockedIndex === closest) {
      // Already locked — navigate to v2 with the right domain+tab
      const items = categories[currentCat];
      const route = cardRoutes[items[closest].label];
      if (route) {
        let url = 'joyai-ui-prototype-v2.html?domain=' + route.domain;
        if (route.tab) url += '&tab=' + route.tab;
        window.location.href = url;
      }
    } else {
      lockedIndex = closest;
      activeIndex = closest;
      cardEls.forEach(c => c.classList.remove('hover-light'));
      lightIndex = -1;
      applyPositions(cardEls, count, activeIndex);
    }
  };
}

function applyPositions(cards, count, focusIndex) {
  const centerIndex = (count - 1) / 2;
  const shiftAmount = focusIndex >= 0 ? (focusIndex - centerIndex) * SPACING : 0;

  cards.forEach((card, i) => {
    const offset = i - centerIndex;
    const newX = offset * SPACING - shiftAmount;
    const distFromCenter = Math.abs(newX / SPACING);
    const rotate = (newX / SPACING) * 6;
    const scale = 1 - distFromCenter * 0.03;
    const y = distFromCenter * 18;
    const isActive = i === focusIndex;

    const finalScale = isActive ? scale * 1.05 : (focusIndex >= 0 ? scale * 0.98 : scale);
    const finalY = isActive ? y - 14 : y;
    const finalOpacity = focusIndex >= 0 && !isActive ? 0.75 : 1;

    card.style.transform = `translateX(${newX}px) translateY(${finalY}px) rotate(${rotate}deg) scale(${finalScale})`;
    card.style.zIndex = isActive ? 100 : count - Math.abs(Math.round(distFromCenter));
    card.style.boxShadow = isActive ? '0 24px 60px rgba(0,0,0,0.12)' : '';
    card.style.opacity = finalOpacity;
  });
}

// Version toggle
let isVersionB = false;
function toggleVersion() {
  isVersionB = !isVersionB;
  document.body.classList.toggle('version-b', isVersionB);
  document.getElementById('vs-label').textContent = isVersionB ? '切换布局 A' : '切换布局 B';
  document.getElementById('nav-tabs-slot').innerHTML = buildTabs();
}

// Init
document.getElementById('hero-tabs').innerHTML = buildTabs();
switchCat('dialog');
</script>
</body>
</html>
